<div class="author">
  <img width="30" class="author-image" src="{{ .Site.Params.authorImage | relURL }}" alt="{{ .Site.Title }}" />
  <span class="author-name">{{ .Site.Title }}</span>
  <span class="author-divider"></span>
  <span class="author-date">{{ dateFormat "January 2, 2006" .Date }}</span>
</div>
