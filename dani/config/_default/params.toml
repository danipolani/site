# Параметры темы hugo-winston-theme
# https://github.com/zerostaticthemes/hugo-winston-theme

twitter_handle = ""
showAuthorOnHomepage = false
showAuthorOnPosts = false
showIntroContentOnHomepage = true
# Блок «Из блога» под газетой: только страницы content/blog/* с show_on_home_blog: true
showPostsOnHomepage = true
usePaginationOnHomepage = false
limitPostsOnHomepage = 8
sortPostsByDateOldestFirst = false
addDot = true
addFrame = true
# Толщина полосы рамки (padding у body; цвет — highlightColor)
frameWidth = "18px"
# Скругление внутренней панели .site-frame-panel; снаружи угол экрана прямой
frameBorderRadius = "40px"
# highlightColor = '#7b16ff'
highlightColor = '#111111'
baseColor = "#F5F5F5"
baseOffsetColor = "#eaeaea"
headingColor = "#1c1b1d"
textColor = "#4e5157"
dotColor = "#4CB51C"
enableGoogleFonts = true
googleFontsUrl = "https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Google+Sans:wght@400;500;600;700&display=swap"
fontFamilyHeading = "'Dela Gothic One', sans-serif"
fontFamilyParagraph = "'Google Sans', sans-serif"
fontFamilyMonospace = "monospace"
