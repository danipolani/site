# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://github.com/zerostaticthemes/hugo-winston-theme

theme = "hugo-winston-theme"
# baseURL = "https://your_domain.com/"
defaultContentLanguage = "ru"

enableRobotsTXT = true
[pagination]
pagerSize = 8
summaryLength = 30

buildDrafts = false
buildFuture = false

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]
